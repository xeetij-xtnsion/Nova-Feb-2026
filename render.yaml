databases:
  - name: nova-db
    plan: starter
    databaseName: nova_agent
    postgresMajorVersion: "16"
    ipAllowList: []  # Allow only internal connections

services:
  - type: redis
    name: nova-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: nova-agent
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nova-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nova-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false  # You'll set this manually in the Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_LLM_MODEL
        value: gpt-4o-mini
      - key: KB_VERSION
        value: "1"
      - key: DASHBOARD_PASSWORD
        sync: false
